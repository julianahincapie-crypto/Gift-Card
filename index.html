<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Tu Regalo Especial!</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e, #16213e); /* Fondo noche estrellada */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- TARJETA --- */
        .card-container {
            width: 320px;
            height: 450px;
            perspective: 1000px;
            cursor: pointer;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        .card.open {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        /* DISEÑO FRONTAL */
        .front {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .front h1 { font-size: 2.5em; margin: 0; }
        .front p { font-size: 1.1em; opacity: 0.9; }
        .icon-gift { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* DISEÑO TRASERO (REGALO) */
        .back {
            background: #ffffff;
            color: #333;
            transform: rotateY(180deg);
            border: 8px solid #2575fc;
        }

        .back h2 { color: #6a11cb; margin-top: 0; font-size: 1.8em; }
        .back .content { font-size: 1.1em; line-height: 1.5; }
        .address { 
            background: #f0f4ff; 
            padding: 10px; 
            border-radius: 10px; 
            font-weight: bold; 
            color: #2575fc;
            margin: 15px 0;
            font-size: 0.9em;
        }
        .footer-msg { font-style: italic; color: #666; font-size: 0.9em; }

        /* --- ESTRELLAS --- */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1) translate(var(--dx), var(--dy)); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_73068e6f1f.mp3" type="audio/mpeg">
    </audio>

    <div class="card-container" onclick="openCard()">
        <div class="card" id="card">
            <div class="front">
                <div class="icon-gift">🎁</div>
                <h1>Para ti...</h1>
                <p>Toca para descubrir tu sorpresa</p>
            </div>

            <div class="back">
                <h2>¡A BAILAR! 💃🕺</h2>
                <div class="content">
                    <p>Te regalamos un pase para <strong>dos clases de baile</strong> en la academia:</p>
                    <div class="address">Dance World<br>Cra 11d #118a - 95</div>
                    <p class="footer-msg">¡Queremos verte disfrutar y moverte al ritmo de este nuevo año!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openCard() {
            const card = document.getElementById('card');
            const music = document.getElementById('music');
            
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                music.play();
                createStars();
            } else {
                card.classList.remove('open');
                music.pause();
                music.currentTime = 0;
            }
        }

        function createStars() {
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Configuración aleatoria
                const size = Math.random() * 4 + 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = '50vw';
                star.style.top = '50vh';
                
                // Dirección de explosión
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 400 + 100;
                const dx = Math.cos(angle) * distance + 'px';
                const dy = Math.sin(angle) * distance + 'px';
                
                star.style.setProperty('--dx', dx);
                star.style.setProperty('--dy', dy);
                
                // Animación
                star.style.animation = `explode ${Math.random() * 1.5 + 0.5}s ease-out forwards`;
                
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 2000);
            }
        }
    </script>
</body>
</html>
